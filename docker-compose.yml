services:
  app:
    build: .
    volumes:
      - .:/app

  train:
    build: .
    volumes:
      - .:/app
    command: python train.py --reward_type shaped --timesteps 200000 --save_path models/ppo_model.zip

  evaluate:
    build: .
    environment:
      - DISPLAY=${DISPLAY}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - .:/app
    command: python evaluate.py --model_path models/ppo_model.zip
